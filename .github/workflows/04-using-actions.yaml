name: 04 - Using Actions
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Printing Folders
        run: ls -la
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
      - name: Install Dependencies
        working-directory: 04-using-actions
        run: npm ci
      - name: Run Tests
        working-directory: 04-using-actions
        run: npm run test