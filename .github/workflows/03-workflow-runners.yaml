name: 03 - Workflow Runners
on: [workflow_dispatch]
jobs:
  ubuntu-echo:
    runs-on: ubuntu-latest
    steps:
        - name: Show OS
          run: echo "This job is running on Ubuntu runner. $RUNNER_OS"
  windows-echo:
    runs-on: windows-latest
    steps:
        - name: Show OS
          shell: bash
          run: echo "This job is running on Windows runner. $RUNNER_OS"
  macos-echo:
    runs-on: macos-latest
    steps:
        - name: Show OS
          shell: bash
          run: echo "This job is running on macOS runner. $RUNNER_OS"